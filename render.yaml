services:
  - type: web
    name: breakup-recovery-assessment
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SITE_ACCESS_CODE
        sync: false
      - key: ACCESS_COOKIE_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: APP_TIMEZONE
        value: Asia/Shanghai
